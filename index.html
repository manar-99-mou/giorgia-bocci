<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Mappa Interattiva con Cuori Animati</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #d1aaff;
      overflow: hidden;
    }
    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    .heart {
      position: absolute;
      width: 32px;
      height: 32px;
      pointer-events: none;
      font-size: 2rem;
      animation: float 6s linear infinite;
    }
    @keyframes float {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0.7) rotate(-10deg);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-10vh) scale(1.2) rotate(10deg);
      }
    }
  </style>
</head>
<body>
  <div id="map">

  </div>


  <script>
    // Funzione per generare cuori animati casuali
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      // Cuore rosa con emoji e filtro
      heart.innerHTML = '💗';
      heart.style.left = Math.random() * 98 + 'vw';
      heart.style.animationDuration = (4 + Math.random() * 3) + 's';
      heart.style.filter = 'drop-shadow(0 0 6px #ff69b4)';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 7000);
    }
    setInterval(createHeart, 400);
    // Placeholder per la mappa (aggiungerai elementi dopo)
    // Puoi aggiungere marker, immagini, ecc. dentro #map
  </script>
</body>
</html>
