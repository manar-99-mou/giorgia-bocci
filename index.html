<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Tu mi piaci tanto</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffc0cb;
      overflow: visible;
      font-family: Arial, sans-serif;
    }
    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      font-weight: bold;
      color: #ff1493;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      z-index: 3;
      text-align: center;
      white-space: nowrap;
    }
    .heart {
      position: absolute;
      width: 32px;
      height: 32px;
      pointer-events: none;
      font-size: 2rem;
      animation: float 6s linear infinite;
      z-index: 2;
    }
    .audio-player {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      z-index: 10;
      font-family: sans-serif;
    }
    .audio-player audio {
      width: 250px;
    }
    @keyframes float {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0.7) rotate(-10deg);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-10vh) scale(1.2) rotate(10deg);
      }
    }
  </style>
</head>
<body>
  <div id="map">
    <div class="title">TU MI PIACI TANTO</div>
  </div>

  <div class="audio-player">
    <div style="margin-bottom: 10px; font-weight: bold;">🎵 Tu mi piaci tanto - Sayf</div>
    <audio controls>
      <source src="" type="audio/mpeg">
      Il tuo browser non supporta l'elemento audio.
    </audio>
    <div style="font-size: 0.9rem; color: #666; margin-top: 8px;">
      Carica il file MP3 per la canzone
    </div>
  </div>

  <script>
    // Funzione per generare cuori animati casuali
    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = '❤️';
      heart.style.left = Math.random() * 98 + 'vw';
      heart.style.fontSize = '3rem';
      heart.style.animationDuration = (6 + Math.random() * 5) + 's';
      heart.style.filter = 'drop-shadow(0 0 10px #ff0000)';
      document.getElementById('map').appendChild(heart);
      setTimeout(() => heart.remove(), 10000);
    }
    setInterval(createHeart, 150);
  </script>
</body>
</html>
